name: LLM Wiki Sync CI

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

jobs:
  sync:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install dependencies
        run: npm install

      - name: Run compile
        run: node llm-wiki-sync.js compile
        continue-on-error: true

      - name: Run lint
        run: node llm-wiki-sync.js lint
        continue-on-error: true

      - name: Run health
        run: node llm-wiki-sync.js health
        continue-on-error: true

      - name: Run dedup
        run: node llm-wiki-sync.js dedup --dedup-mode=loose
        continue-on-error: true

      - name: Run stats
        run: node llm-wiki-sync.js stats

      - name: Upload report
        if: always()
        run: |
          node llm-wiki-sync.js export --format=json --out ./artifacts || true
          node llm-wiki-sync.js export --format=html --out ./artifacts || true

      - name: Upload artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: wiki-sync-reports
          path: artifacts/
          retention-days: 14

  backup:
    runs-on: ubuntu-latest
    # Run backup only on main/master push
    if: github.event_name == 'push'
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Run backup
        run: node llm-wiki-sync.js backup --backup-dir ./wiki-backups
        continue-on-error: true

      - name: Upload backup
        uses: actions/upload-artifact@v4
        with:
          name: wiki-backup-${{ github.run_number }}
          path: wiki-backups/
          retention-days: 30
